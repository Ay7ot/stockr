<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3"/>
      <stop offset="100%" style="stop-color:#004ea8"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Grid of stacked items (3x3 grid representing inventory) -->
  <g transform="translate(256, 256)">
    <!-- Stack 1: Bottom layer (darker/back) -->
    <rect x="-100" y="-40" width="70" height="70" rx="12" fill="white" opacity="0.25"/>
    <rect x="-10" y="-40" width="70" height="70" rx="12" fill="white" opacity="0.25"/>
    <rect x="80" y="-40" width="70" height="70" rx="12" fill="white" opacity="0.25"/>
    
    <!-- Stack 2: Middle layer -->
    <rect x="-100" y="50" width="70" height="70" rx="12" fill="white" opacity="0.5"/>
    <rect x="-10" y="50" width="70" height="70" rx="12" fill="white" opacity="0.5"/>
    <rect x="80" y="50" width="70" height="70" rx="12" fill="white" opacity="0.5"/>
    
    <!-- Stack 3: Top layer (brightest/front) -->
    <rect x="-100" y="140" width="70" height="70" rx="12" fill="white" opacity="0.85" stroke="white" stroke-width="3"/>
    <rect x="-10" y="140" width="70" height="70" rx="12" fill="white" stroke="white" stroke-width="3"/>
    <rect x="80" y="140" width="70" height="70" rx="12" fill="white" opacity="0.85" stroke="white" stroke-width="3"/>
    
    <!-- Accent checkmark on center item (inventory tracked) -->
    <path d="M 5 165 L 20 180 L 50 150" fill="none" stroke="#0071e3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>